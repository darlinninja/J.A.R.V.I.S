<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S. Mark IV</title>
    <!-- Google Fonts para la estética Stark -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- CONTENEDOR DEL HOLOGRAMA (Ocupa el 30-40% superior) -->
    <div class="hologram-suite">
        <div class="ring ring-outer"></div>
        <div class="ring ring-mid"></div>
        <!-- El Orbe es el núcleo de poder -->
        <div id="jarvis-orb"></div>
    </div>

    <!-- PANEL DE INTERFAZ (Alineado abajo del orbe) -->
    <div class="interface-panel">
        <h1 class="status-text">J.A.R.V.I.S.</h1>
        <button id="btn-escuchar">Activar Protocolo</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
